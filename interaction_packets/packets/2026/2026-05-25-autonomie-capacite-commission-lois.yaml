core_claims:
  - "L'autonomie juridique ne suffit pas si elle ne produit pas de capacité réelle d'action."
  - "L'autonomie reconnue à la Corse doit répondre aux déséquilibres spécifiques du territoire."
  - "L'IA peut aider à structurer une contribution, mais la responsabilité de l'acte reste humaine."
  - "Une contribution publique doit rester traçable, vérifiable et corrigeable."

statut: "contribution transmise"
resume_public: >
  Demande d'audience officielle envoyée le 25 mai 2026. Le 28 mai 2026, le service de la
  Commission des Lois a indiqué que le cycle d'auditions était terminé, mais qu'une contribution
  écrite pouvait être transmise et éventuellement mentionnée dans le rapport. Une contribution
  publique sur l'Autonomie de Capacité a été envoyée le même jour, avec mention explicite de
  l'aide de l'IA comme outil de structuration placé sous responsabilité humaine exclusive.

