contexte: >
  Interaction institutionnelle engagée dans le cadre du processus constitutionnel relatif
  à la Corse. Une demande d'audience adressée à la Commission des Lois a été transformée,
  après réponse du service compétent, en transmission d'une contribution écrite publique.

demande: >
  Présenter une contribution associative et citoyenne autour de l'Autonomie de Capacité :
  distinction entre autonomie institutionnelle et capacité réelle d'agir, prévention d'une
  autonomie seulement formelle ou procédurale, place des acteurs associatifs et territoriaux,
  expérimentation territoriale, approche ouverte, documentée, vérifiable et non partisane.

