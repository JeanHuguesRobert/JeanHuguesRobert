sujet: "Demande d'audience — contribution associative sur l'Autonomie de Capacité"
contexte: >
  Dans un entretien publié par Corse-Matin le 25 mai 2026, F. Boudié indiquait vouloir
  échanger avec les institutions, la Collectivité, l'État, les acteurs socio-économiques,
  associatifs et culturels, y compris des sensibilités non représentées à l'Assemblée de Corse.
demande: >
  Audience pour présenter une contribution associative et citoyenne autour de
  l'Autonomie de Capacité : distinction entre autonomie institutionnelle et capacité
  réelle d'agir, place des acteurs associatifs, expérimentation territoriale, approche
  ouverte, documentée, vérifiable et non partisane. Adressée strictement par voie
  officielle (adresse parlementaire ; copie au secrétariat de la commission des lois ;
  copie à l'Institut Mariani) et annoncée publiquement.
