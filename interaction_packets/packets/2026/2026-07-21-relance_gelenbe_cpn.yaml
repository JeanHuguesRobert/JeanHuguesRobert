contexte: >
  Erol Gelenbe est cité aux deux pôles du corpus de paquétisation : EPN (énergie, dans
  « The Unconscious Grid ») et CPN (cognition, dans « When Cognition Became Traffic »).
  La claim C11 formule une inversion relative de son CPN de 1999. Un premier message lui
  a été adressé antérieurement, resté sans réponse ; le canal exact de ce premier contact
  est incertain (adresse institutionnelle jhr@baronsmariani.org ou messagerie LinkedIn) —
  l'absence de trace dans le Gmail connecté a été vérifiée le 2026-07-21. Cette incertitude
  de canal illustre le problème de fragmentation des canaux de contact documenté par
  ailleurs dans le corpus.

demande: >
  Notifier la citation et l'inversion (C11 resserrée) ; informer que la claim a survécu,
  avant envoi, à l'expérience de falsification multi-fournisseurs CPKT-2026-001 (publique) ;
  inviter le destinataire à fournir le « hop humain décorrélé » manquant de l'expérience :
  juger, depuis le siège de l'auteur, si la C11 resserrée est loyale envers CPN.

